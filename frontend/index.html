<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1714;
      --text-muted: #8a8278;
      --light-sq: #f0e9de;
      --dark-sq: #b8a898;
      --selected: #f6c84440;
      --last-move: #cdb97a30;
      --accent: #3d6b4f;
      --accent-light: #4e8a64;
      --shadow: 0 2px 24px rgba(0,0,0,0.08);
      --radius: 4px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 820px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .app {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      width: 100%;
      max-width: 820px;
    }

    .board-wrap { flex-shrink: 0; }

    .board-outer {
      background: var(--surface);
      border-radius: 6px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    /* Score bars */
    .score-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 2px;
      min-height: 32px;
    }

    .player-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 64px;
      transition: color 0.2s;
    }

    .player-label.active-player { color: var(--text); font-weight: 600; }

    .player-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .player-dot.w { background: #fff; }
    .player-dot.b { background: #1a1714; border-color: #1a1714; }

    .score-captured {
      font-size: 0.95rem;
      letter-spacing: -3px;
      flex: 1;
    }

    .score-adv {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      background: #e8f0eb;
      border-radius: 10px;
      padding: 2px 8px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .score-adv.show { opacity: 1; }

    /* Board */
    .coord-row {
      display: flex;
      justify-content: space-around;
      padding: 4px 0 0;
    }

    .coord-row span, .coord-col span {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      width: 12px;
      text-align: center;
      user-select: none;
    }

    .board-and-ranks { display: flex; gap: 6px; }

    .coord-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 424px;
      height: 424px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .square {
      width: 53px; height: 53px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
    }

    .square.light { background: var(--light-sq); }
    .square.dark  { background: var(--dark-sq); }

    .square.selected::after,
    .square.last-move::after,
    .square.in-check::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .square.selected::after  { background: var(--selected); }
    .square.last-move::after { background: var(--last-move); }
    .square.in-check::after  { background: rgba(192,57,43,0.25); }

    .square.legal .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .square.legal-capture .dot {
      width: 100%; height: 100%;
      background: transparent;
      border: 4px solid rgba(0,0,0,0.18);
      border-radius: 0;
    }

    .piece {
      font-size: 38px;
      line-height: 1;
      user-select: none;
      position: relative;
      z-index: 1;
      transition: transform 0.08s;
      cursor: grab;
    }

    .piece:active { cursor: grabbing; transform: scale(1.1); }

    /* Panel */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 200px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }

    .toggle-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    #status {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }

    .thinking {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      margin-top: 6px;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #move-list {
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      max-height: 180px;
      overflow-y: auto;
      color: var(--text);
      line-height: 1.8;
    }

    .move-pair { display: flex; gap: 8px; }
    .move-num { color: var(--text-muted); min-width: 24px; }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-light); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-top: 6px;
    }

    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Board flip animation */
    .board-container { perspective: 1000px; }

    #board {
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }

    #board.flip-out {
      transform: rotateY(90deg);
      pointer-events: none;
    }

    /* Promotion */
    #promo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #promo-overlay.show { display: flex; }

    #promo-dialog {
      background: var(--surface);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    #promo-dialog p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .promo-pieces { display: flex; gap: 8px; justify-content: center; }

    .promo-piece {
      font-size: 2.4rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      transition: all 0.1s;
    }

    .promo-piece:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }

    /* Timer */
    .game-timer {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 5px;
    }

    /* Save game banner */
    #save-banner {
      display: none;
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.84rem;
      font-weight: 500;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }
    #save-banner.show { display: flex; }
    @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }
    #save-banner button {
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
    }
    #save-banner button:hover { background: rgba(255,255,255,0.35); }

    /* History modal */
    #history-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #history-overlay.show { display: flex; }

    #history-dialog {
      background: var(--surface);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
    }

    #close-history {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 4px;
    }

    #history-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-empty {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      padding: 32px 0;
    }

    .history-row {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s;
    }
    .history-row:hover { border-color: var(--accent); }

    .history-result-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .hist-win  { background: var(--accent); }
    .hist-loss { background: #c0392b; }
    .hist-draw { background: #b8a898; }

    .history-info { flex: 1; min-width: 0; }
    .history-matchup {
      font-size: 0.84rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .history-result-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .hist-win-label  { background: #e8f0eb; color: var(--accent); }
    .hist-loss-label { background: #fdecea; color: #c0392b; }
    .hist-draw-label { background: #f0ede8; color: var(--text-muted); }

    .history-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .history-actions button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .history-actions button:hover { border-color: var(--accent); color: var(--accent); }
    .del-btn:hover { border-color: #c0392b !important; color: #c0392b !important; }

    /* PGN viewer inside history */
    #pgn-viewer {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #pgn-viewer.show { display: flex; }
    #pgn-back {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      text-align: left;
      padding: 0;
    }
    #pgn-back:hover { text-decoration: underline; }
    #pgn-text {
      background: #f8f6f2;
      border-radius: 6px;
      padding: 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.73rem;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 300px;
      color: var(--text);
    }

    @media (max-width: 680px) {
      .app { flex-direction: column; align-items: center; }
      #board { width: 320px; height: 320px; }
      .square { width: 40px; height: 40px; }
      .piece { font-size: 28px; }
      .board-outer { padding: 16px; }
      #history-dialog { padding: 18px; }
      .history-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>Chess</h1>
  <span>v1.2</span>
  <button class="toggle-btn" id="history-btn" style="margin-left:auto;font-size:0.75rem;padding:5px 14px;">&#128203; History</button>
</header>

<div class="app">

  <div class="board-wrap">
    <!-- Top player -->
    <div class="score-bar">
      <div class="player-label" id="label-top">
        <div class="player-dot b" id="dot-top"></div>
        <span id="name-top">Black</span>
      </div>
      <div class="score-captured" id="cap-top"></div>
      <div class="score-adv" id="adv-top"></div>
    </div>

    <div class="board-outer">
      <div class="board-and-ranks">
        <div class="coord-col" id="rank-coords"></div>
        <div class="board-container">
          <div id="board"></div>
          <div class="coord-row" id="file-coords"></div>
        </div>
      </div>
    </div>

    <!-- Bottom player -->
    <div class="score-bar">
      <div class="player-label active-player" id="label-bottom">
        <div class="player-dot w" id="dot-bottom"></div>
        <span id="name-bottom">White</span>
      </div>
      <div class="score-captured" id="cap-bottom"></div>
      <div class="score-adv" id="adv-bottom"></div>
    </div>
  </div>

  <div class="panel">

    <div class="card">
      <div class="card-title">Mode</div>
      <div class="toggle-group" id="mode-group">
        <button class="toggle-btn active" data-mode="ai">vs Computer</button>
        <button class="toggle-btn" data-mode="pass">Pass & Play</button>
      </div>

      <div id="difficulty-row" style="margin-top:14px;">
        <div class="card-title">Difficulty</div>
        <div class="toggle-group" id="diff-group">
          <button class="toggle-btn" data-diff="easy">Easy</button>
          <button class="toggle-btn active" data-diff="medium">Medium</button>
          <button class="toggle-btn" data-diff="hard">Hard</button>
        </div>
      </div>

      <div id="color-row" style="margin-top:14px;">
        <div class="card-title">Play as</div>
        <div class="toggle-group" id="color-group">
          <button class="toggle-btn active" data-color="w">White</button>
          <button class="toggle-btn" data-color="b">Black</button>
        </div>
      </div>

      <button class="btn btn-primary" style="margin-top:16px;" id="new-game-btn">New Game</button>
    </div>

    <div id="save-banner">
      <span id="save-banner-text">Game over</span>
      <button id="save-btn">💾 Save Game</button>
    </div>

    <div class="card">
      <div class="card-title">Status</div>
      <div id="status">White to move</div>
      <div id="thinking-indicator" class="thinking" style="display:none;">thinking…</div>
      <div class="game-timer" id="game-timer">0:00</div>
    </div>

    <div class="card">
      <div class="card-title">Moves</div>
      <div id="move-list"><span style="color:var(--text-muted);font-family:DM Mono;font-size:.75rem;">—</span></div>
      <button class="btn btn-ghost" id="undo-btn">Undo move</button>
    </div>

  </div>
</div>

<!-- History Modal -->
<div id="history-overlay">
  <div id="history-dialog">
    <div class="history-header">
      <h2>Game History</h2>
      <button id="close-history">✕</button>
    </div>

    <!-- Game list view -->
    <div id="history-list-view">
      <div id="history-list">
        <div class="history-empty">Loading…</div>
      </div>
    </div>

    <!-- PGN viewer -->
    <div id="pgn-viewer">
      <button id="pgn-back">← Back to history</button>
      <pre id="pgn-text"></pre>
      <button class="btn btn-primary" id="pgn-download-btn">⬇ Download .pgn</button>
    </div>
  </div>
</div>

<div id="promo-overlay">
  <div id="promo-dialog">
    <p>Promote pawn</p>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<script>
  // If you deploy frontend+backend together, this uses same-origin automatically.
  // If you deploy backend separately, use ?api=https://your-backend.example
  const API =
    (new URLSearchParams(location.search).get('api')) ||
    (location.origin === 'null' ? 'http://localhost:3001' : location.origin);

  // ─── Timer ─────────────────────────────────────────────────────────────────
  let timerInterval = null;
  let timerSeconds = 0;

  function startTimer() {
    timerSeconds = 0;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = Math.floor(timerSeconds / 60);
      const s = timerSeconds % 60;
      document.getElementById('game-timer').textContent = m + ':' + String(s).padStart(2, '0');
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  // ─── Save Game ──────────────────────────────────────────────────────────────
  async function saveGame(result, resultDetail) {
    const sanMoves = state.history
      .filter(h => h.move && h.move.san)
      .map(h => h.move.san);

    try {
      const res = await fetch(API + '/api/games', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: state.mode,
          difficulty: state.difficulty,
          playerColor: state.playerColor,
          result,
          resultDetail,
          sanMoves,
          durationSeconds: timerSeconds,
        }),
      });
      const data = await res.json();
      if (data.id) {
        document.getElementById('save-btn').textContent = '✓ Saved';
        document.getElementById('save-btn').disabled = true;
      }
    } catch {
      document.getElementById('save-btn').textContent = '⚠ Could not save';
    }
  }

  document.getElementById('save-btn').addEventListener('click', () => {
    const statusText = document.getElementById('status').textContent;
    let result = 'draw', resultDetail = statusText;
    if (statusText.includes('White wins')) { result = 'white'; }
    else if (statusText.includes('Black wins')) { result = 'black'; }
    saveGame(result, resultDetail);
  });

  // ─── History Modal ──────────────────────────────────────────────────────────
  let currentPgnGameId = null;

  async function openHistory() {
    document.getElementById('history-overlay').classList.add('show');
    document.getElementById('pgn-viewer').classList.remove('show');
    document.getElementById('history-list-view').style.display = 'block';
    await loadHistory();
  }

  async function loadHistory() {
    const listEl = document.getElementById('history-list');
    listEl.innerHTML = '<div class="history-empty">Loading…</div>';
    try {
      const res = await fetch(API + '/api/games');
      const data = await res.json();
      renderHistoryList(data.games ?? []);
    } catch {
      listEl.innerHTML = '<div class="history-empty">Could not load history. Is the backend running?</div>';
    }
  }

  function renderHistoryList(games) {
    const listEl = document.getElementById('history-list');
    if (!games.length) {
      listEl.innerHTML = '<div class="history-empty">No saved games yet. Finish a game and press 💾 Save Game!</div>';
      return;
    }
    listEl.innerHTML = '';
    for (const g of games) {
      const isWin  = (g.result === 'white' && g.player_color === 'w') || (g.result === 'black' && g.player_color === 'b');
      const isLoss = (g.result === 'white' && g.player_color === 'b') || (g.result === 'black' && g.player_color === 'w');
      const isDraw = g.result === 'draw';
      const dotCls  = isWin ? 'hist-win' : isLoss ? 'hist-loss' : 'hist-draw';
      const lblCls  = isWin ? 'hist-win-label' : isLoss ? 'hist-loss-label' : 'hist-draw-label';
      const lblText = isWin ? 'WIN' : isLoss ? 'LOSS' : 'DRAW';
      const mins = Math.floor((g.duration_seconds||0) / 60);
      const secs = String((g.duration_seconds||0) % 60).padStart(2, '0');
      const movePairs = Math.ceil(g.moves_count / 2);

      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `
        <div class="history-result-dot ${dotCls}"></div>
        <div class="history-info">
          <div class="history-matchup">${g.white_label} vs ${g.black_label}</div>
          <div class="history-meta">${g.date} · ${movePairs} moves · ${mins}:${secs} · ${g.mode === 'ai' ? g.difficulty : 'pass & play'}</div>
        </div>
        <span class="history-result-label ${lblCls}">${lblText}</span>
        <div class="history-actions">
          <button class="pgn-view-btn" data-id="${g.id}">PGN</button>
          <button class="del-btn" data-id="${g.id}">🗑</button>
        </div>
      `;
      listEl.appendChild(row);
    }

    listEl.querySelectorAll('.pgn-view-btn').forEach(btn => {
      btn.addEventListener('click', () => viewPGN(btn.dataset.id));
    });
    listEl.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteGame(btn.dataset.id));
    });
  }

  async function viewPGN(id) {
    currentPgnGameId = id;
    try {
      const res = await fetch(API + '/api/games/' + id);
      const data = await res.json();
      document.getElementById('pgn-text').textContent = data.pgn;
      document.getElementById('history-list-view').style.display = 'none';
      document.getElementById('pgn-viewer').classList.add('show');
    } catch {
      alert('Could not load PGN.');
    }
  }

  async function deleteGame(id) {
    if (!confirm('Delete this saved game?')) return;
    try {
      await fetch(API + '/api/games/' + id, { method: 'DELETE' });
      await loadHistory();
    } catch {
      alert('Could not delete game.');
    }
  }

  document.getElementById('history-btn').addEventListener('click', openHistory);
  document.getElementById('close-history').addEventListener('click', () => {
    document.getElementById('history-overlay').classList.remove('show');
  });
  document.getElementById('pgn-back').addEventListener('click', async () => {
    document.getElementById('pgn-viewer').classList.remove('show');
    document.getElementById('history-list-view').style.display = 'block';
  });
  document.getElementById('pgn-download-btn').addEventListener('click', () => {
    if (currentPgnGameId) {
      window.location.href = API + '/api/games/' + currentPgnGameId + '/pgn';
    }
  });
  document.getElementById('history-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('history-overlay')) {
      document.getElementById('history-overlay').classList.remove('show');
    }
  });

  const PIECES = {
    wk:'♔', wq:'♕', wr:'♖', wb:'♗', wn:'♘', wp:'♙',
    bk:'♚', bq:'♛', br:'♜', bb:'♝', bn:'♞', bp:'♟',
  };

  const MAT_VAL = { p:1, n:3, b:3, r:5, q:9 };
  const CAP_SYM = { p:'♟', n:'♞', b:'♝', r:'♜', q:'♛' };

  let state = {
    fen: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1',
    selected: null,
    legalMoves: [],     // [{to, isCapture, isEnPassant, isPromotion, ...}]
    mode: 'ai',
    difficulty: 'medium',
    playerColor: 'w',
    turn: 'w',
    viewAs: 'w',        // whose perspective the board shows
    gameOver: false,
    lastMove: null,     // Move object or null
    history: [],        // [{fen, move}]
    capturedByWhite: [],
    capturedByBlack: [],
    isThinking: false,
    inCheck: null,
  };

  function fenToBoard(fen) {
    return fen.split(' ')[0].split('/').map(row => {
      const r = [];
      for (const ch of row) {
        if (/\d/.test(ch)) for (let i = 0; i < +ch; i++) r.push(null);
        else r.push(ch);
      }
      return r;
    });
  }

  function sq(rank, file) {
    return String.fromCharCode(97 + file) + (8 - rank);
  }

  function pieceKey(ch) {
    if (!ch) return null;
    return (ch === ch.toUpperCase() ? 'w' : 'b') + ch.toLowerCase();
  }

  function calcAdvantage() {
    const wGain = state.capturedByWhite.reduce((s,p) => s + (MAT_VAL[p.toLowerCase()]??0), 0);
    const bGain = state.capturedByBlack.reduce((s,p) => s + (MAT_VAL[p.toLowerCase()]??0), 0);
    return wGain - bGain;
  }

  function setControlsDisabled(disabled) {
    document.querySelectorAll(
      '#mode-group button, #diff-group button, #color-group button, #new-game-btn, #undo-btn'
    ).forEach(b => b.disabled = disabled);
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    const board = fenToBoard(state.fen);
    const flipped = state.viewAs === 'b';

    for (let r = 0; r < 8; r++) {
      for (let f = 0; f < 8; f++) {
        const rank = flipped ? 7 - r : r;
        const file = flipped ? 7 - f : f;
        const square = sq(rank, file);

        // a1 is dark on a real chessboard
        const isLight = (rank + file) % 2 === 0;

        const piece = board[rank]?.[file] ?? null;
        const pkey = pieceKey(piece);

        const div = document.createElement('div');
        div.className = `square ${isLight ? 'light' : 'dark'}`;
        div.dataset.sq = square;

        if (state.selected === square) div.classList.add('selected');
        if (state.lastMove && (state.lastMove.from === square || state.lastMove.to === square))
          div.classList.add('last-move');
        if (state.inCheck === square) div.classList.add('in-check');

        const lm = state.legalMoves.find(m => m.to === square);
        if (lm) {
          div.classList.add(lm.isCapture ? 'legal-capture' : 'legal');
          const dot = document.createElement('div');
          dot.className = 'dot';
          div.appendChild(dot);
        }

        if (pkey && PIECES[pkey]) {
          const span = document.createElement('span');
          span.className = 'piece';
          span.textContent = PIECES[pkey];
          div.appendChild(span);
        }

        el.appendChild(div);
      }
    }
  }

  function renderCoords() {
    const flipped = state.viewAs === 'b';
    const rankEl = document.getElementById('rank-coords');
    const fileEl = document.getElementById('file-coords');
    rankEl.innerHTML = '';
    fileEl.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const r = document.createElement('span');
      r.textContent = flipped ? i + 1 : 8 - i;
      rankEl.appendChild(r);
      const f = document.createElement('span');
      f.textContent = String.fromCharCode(flipped ? 104 - i : 97 + i);
      fileEl.appendChild(f);
    }
  }

  function renderScoreBars() {
    const adv = calcAdvantage();
    const bottomColor = state.viewAs;
    const topColor = bottomColor === 'w' ? 'b' : 'w';

    document.getElementById('name-bottom').textContent = bottomColor === 'w' ? 'White' : 'Black';
    document.getElementById('name-top').textContent    = topColor    === 'w' ? 'White' : 'Black';
    document.getElementById('dot-bottom').className = `player-dot ${bottomColor}`;
    document.getElementById('dot-top').className    = `player-dot ${topColor}`;

    document.getElementById('label-bottom').className =
      'player-label' + (state.turn === bottomColor && !state.gameOver ? ' active-player' : '');
    document.getElementById('label-top').className =
      'player-label' + (state.turn === topColor && !state.gameOver ? ' active-player' : '');

    const bottomCap = bottomColor === 'w' ? state.capturedByWhite : state.capturedByBlack;
    const topCap    = topColor    === 'w' ? state.capturedByWhite : state.capturedByBlack;
    document.getElementById('cap-bottom').textContent = bottomCap.map(p => CAP_SYM[p.toLowerCase()]??'').join('');
    document.getElementById('cap-top').textContent    = topCap.map(p => CAP_SYM[p.toLowerCase()]??'').join('');

    const advBottomEl = document.getElementById('adv-bottom');
    const advTopEl    = document.getElementById('adv-top');
    advBottomEl.classList.remove('show');
    advTopEl.classList.remove('show');

    const bottomAdv = bottomColor === 'w' ? adv : -adv;
    if (bottomAdv > 0) {
      advBottomEl.textContent = `+${bottomAdv}`;
      advBottomEl.classList.add('show');
    } else if (bottomAdv < 0) {
      advTopEl.textContent = `+${-bottomAdv}`;
      advTopEl.classList.add('show');
    }
  }

  function renderMoveList() {
    const el = document.getElementById('move-list');
    if (!state.history.length) {
      el.innerHTML = `<span style="color:var(--text-muted);font-family:DM Mono;font-size:.75rem;">—</span>`;
      return;
    }
    let html = '';
    for (let i = 0; i < state.history.length; i += 2) {
      const num = Math.floor(i / 2) + 1;
      const m1 = state.history[i]?.move?.san ?? '';
      const m2 = state.history[i + 1]?.move?.san ?? '';
      html += `<div class="move-pair"><span class="move-num">${num}.</span><span class="move-san">${m1}</span><span class="move-san">${m2}</span></div>`;
    }
    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
  }

  function renderAll() {
    renderBoard();
    renderMoveList();
    renderScoreBars();
  }

  async function onSquareClick(square) {
    if (state.gameOver || state.isThinking) return;
    if (state.mode === 'ai' && state.turn !== state.playerColor) return;

    const canMoveThere = state.legalMoves.some(m => m.to === square);
    if (state.selected && canMoveThere) {
      await makePlayerMove(state.selected, square);
      return;
    }

    const board = fenToBoard(state.fen);
    const file = square.charCodeAt(0) - 97;
    const rank = 8 - parseInt(square[1]);
    const piece = board[rank]?.[file];
    if (!piece) { clearSelection(); return; }

    const color = piece === piece.toUpperCase() ? 'w' : 'b';
    if (color !== state.turn) { clearSelection(); return; }

    state.selected = square;
    await fetchLegalMoves(square);
    renderBoard();
  }

  function clearSelection() {
    state.selected = null;
    state.legalMoves = [];
    renderBoard();
  }

  async function fetchLegalMoves(square) {
    try {
      const res = await fetch(`${API}/api/legal-moves`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fen: state.fen, square }),
      });
      const data = await res.json();

      if (!Array.isArray(data.moves)) {
        state.legalMoves = [];
        return;
      }

      // Support both new (objects) and old (string[]) formats
      if (typeof data.moves[0] === 'string') {
        state.legalMoves = data.moves.map(to => ({
          to,
          isCapture: false,
          isEnPassant: false,
          isPromotion: false,
        }));
      } else {
        state.legalMoves = data.moves;
      }
    } catch {
      state.legalMoves = [];
    }
  }

  function showPromotion(color) {
    return new Promise(resolve => {
      const overlay = document.getElementById('promo-overlay');
      const piecesEl = document.getElementById('promo-pieces');
      overlay.classList.add('show');
      piecesEl.innerHTML = '';
      const opts = color === 'w'
        ? [['q','♕'],['r','♖'],['b','♗'],['n','♘']]
        : [['q','♛'],['r','♜'],['b','♝'],['n','♞']];
      for (const [val, sym] of opts) {
        const btn = document.createElement('div');
        btn.className = 'promo-piece';
        btn.textContent = sym;
        btn.onclick = () => { overlay.classList.remove('show'); resolve(val); };
        piecesEl.appendChild(btn);
      }
    });
  }

  async function makePlayerMove(from, to) {
    const board = fenToBoard(state.fen);
    const file = from.charCodeAt(0) - 97;
    const rank = 8 - parseInt(from[1]);
    const piece = board[rank]?.[file];
    const targetRank = parseInt(to[1]);
    let promotion;
    if (piece?.toLowerCase() === 'p' && (targetRank === 8 || targetRank === 1)) {
      promotion = await showPromotion(state.turn);
    }

    try {
      const res = await fetch(`${API}/api/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fen: state.fen, from, to, promotion }),
      });
      const data = await res.json();
      if (data.error) { clearSelection(); return; }

      updateStateAfterMove(data);

      if (!state.gameOver) {
        if (state.mode === 'ai') await doAiMove();
        else await autoFlipBoard();
      }
    } catch {
      setStatus('⚠ Cannot reach server. Is the backend running?');
      clearSelection();
    }
  }

  async function doAiMove() {
    state.isThinking = true;
    setControlsDisabled(true);
    document.getElementById('thinking-indicator').style.display = 'block';
    renderBoard();

    try {
      const res = await fetch(`${API}/api/ai-move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fen: state.fen, difficulty: state.difficulty }),
      });
      const data = await res.json();
      if (!data.error) updateStateAfterMove(data); // even if move is null (game over)
    } catch {
      setStatus('⚠ Cannot reach server.');
    } finally {
      state.isThinking = false;
      setControlsDisabled(false);
      document.getElementById('thinking-indicator').style.display = 'none';
    }
  }

  function updateStateAfterMove(data) {
    state.history.push({ fen: state.fen, move: data.move ?? null });
    state.fen = data.fen;
    state.turn = data.turn;
    state.lastMove = data.move ?? null;
    state.selected = null;
    state.legalMoves = [];

    if (data.move && data.move.captured) {
      if (data.move.color === 'w') state.capturedByWhite.push(data.move.captured);
      else state.capturedByBlack.push(data.move.captured);
    }

    state.inCheck = data.isCheck ? findKing(data.fen, data.turn) : null;

    if (data.isGameOver) {
      state.gameOver = true;
      stopTimer();
      let bannerText, gameResult;
      if (data.isCheckmate) {
        const winner = data.turn === 'w' ? 'Black' : 'White';
        setStatus(`Checkmate — ${winner} wins!`);
        bannerText = `Checkmate — ${winner} wins!`;
        gameResult = data.turn === 'w' ? 'black' : 'white';
      } else if (data.isStalemate) {
        setStatus('Stalemate — draw!');
        bannerText = 'Stalemate — draw!';
        gameResult = 'draw';
      } else {
        setStatus('Draw!');
        bannerText = 'Draw!';
        gameResult = 'draw';
      }
      document.getElementById('save-banner-text').textContent = bannerText;
      document.getElementById('save-btn').textContent = '💾 Save Game';
      document.getElementById('save-btn').disabled = false;
      document.getElementById('save-banner').classList.add('show');
    } else {
      state.gameOver = false;
      const who = data.turn === 'w' ? 'White' : 'Black';
      setStatus(data.isCheck ? `Check! ${who} to move` : `${who} to move`);
    }

    if (state.mode === 'ai') state.viewAs = state.playerColor;
    renderAll();
  }

  function findKing(fen, color) {
    const board = fenToBoard(fen);
    const king = color === 'w' ? 'K' : 'k';
    for (let r = 0; r < 8; r++)
      for (let f = 0; f < 8; f++)
        if (board[r]?.[f] === king) return sq(r, f);
    return null;
  }

  async function autoFlipBoard() {
    const boardEl = document.getElementById('board');
    boardEl.classList.add('flip-out');
    await new Promise(r => setTimeout(r, 220));
    state.viewAs = state.turn;
    renderCoords();
    renderAll();
    boardEl.classList.remove('flip-out');
  }

  function undoMove() {
    if (state.gameOver) return;
    if (state.isThinking) return;

    const steps = state.mode === 'ai' ? 2 : 1;
    for (let i = 0; i < steps; i++) {
      if (!state.history.length) break;
      const prev = state.history.pop();
      if (prev) {
        state.fen = prev.fen;
        state.turn = prev.fen.split(' ')[1];
        state.lastMove = state.history[state.history.length - 1]?.move ?? null;

        if (prev.move && prev.move.captured) {
          if (prev.move.color === 'w') state.capturedByWhite.pop();
          else state.capturedByBlack.pop();
        }
      }
    }
    state.selected = null;
    state.legalMoves = [];
    state.inCheck = null;
    if (state.mode === 'pass') { state.viewAs = state.turn; renderCoords(); }
    setStatus(state.turn === 'w' ? 'White to move' : 'Black to move');
    renderAll();
  }

  async function newGame() {
    state.fen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
    state.selected = null; state.legalMoves = [];
    state.turn = 'w'; state.gameOver = false;
    state.lastMove = null; state.history = [];
    state.capturedByWhite = []; state.capturedByBlack = [];
    state.isThinking = false; state.inCheck = null;
    document.getElementById('save-banner').classList.remove('show');
    document.getElementById('game-timer').textContent = '0:00';
    startTimer();

    state.viewAs = state.mode === 'pass' ? 'w' : state.playerColor;
    setStatus('White to move');
    renderCoords();
    renderAll();

    if (state.mode === 'ai' && state.playerColor === 'b') await doAiMove();
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  document.getElementById('new-game-btn').addEventListener('click', newGame);
  document.getElementById('undo-btn').addEventListener('click', undoMove);

  // event delegation: one listener on the board
  document.getElementById('board').addEventListener('click', (e) => {
    const sqEl = e.target.closest('.square');
    if (!sqEl) return;
    onSquareClick(sqEl.dataset.sq);
  });

  document.getElementById('mode-group').addEventListener('click', e => {
    const btn = e.target.closest('[data-mode]');
    if (!btn) return;
    if (state.isThinking) return;

    state.mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const ai = state.mode === 'ai';
    document.getElementById('difficulty-row').style.display = ai ? 'block' : 'none';
    document.getElementById('color-row').style.display = ai ? 'block' : 'none';

    state.viewAs = state.mode === 'pass' ? state.turn : state.playerColor;
    renderCoords();
    renderAll();
  });

  document.getElementById('diff-group').addEventListener('click', e => {
    const btn = e.target.closest('[data-diff]');
    if (!btn) return;
    if (state.isThinking) return;

    state.difficulty = btn.dataset.diff;
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });

  document.getElementById('color-group').addEventListener('click', e => {
    const btn = e.target.closest('[data-color]');
    if (!btn) return;
    if (state.isThinking) return;

    state.playerColor = btn.dataset.color;
    state.viewAs = state.playerColor;
    document.querySelectorAll('[data-color]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCoords();
    renderAll();
  });

  renderCoords();
  renderAll();
  setStatus('White to move');
</script>
</body>
</html>
